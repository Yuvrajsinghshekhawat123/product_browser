name: CD - Deploy to AWS EC2

on:
  push:
    branches:
      - main # Triggers the workflow only when code is pushed to the main branch

jobs:
  deploy:
    name: Deploy Application to EC2
    runs-on: ubuntu-latest

    steps:
      # Step 1: Login to EC2 via SSH and deploy
      - name: SSH into EC2 and update containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Navigate to the project folder
            cd ~/product-browser

            # 2. Pull the latest commits from Github
            git pull origin main

            # 3. Rebuild and restart the containers
            docker-compose down
            docker-compose up --build -d

            # 4. Clean up unused Docker resources to save disk space
            docker image prune -f
