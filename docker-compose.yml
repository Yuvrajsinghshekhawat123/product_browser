version: '3.8'

services:
  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: product-browser-backend
    restart: unless-stopped
    env_file:
      - ./Server/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://54.91.28.36
    ports:
      - "5000:5000"
    networks:
      - product_browser_net

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: product-browser-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - product_browser_net

networks:
  product_browser_net:
    driver: bridge
